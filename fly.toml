# fly.toml app configuration file generated for rails-streaming-poc on 2025-02-11T23:55:30Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rails-streaming-poc'
primary_region = 'fra'
console_command = '/rails/bin/rails console'

[build]

[http_service]
  internal_port = 9292
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
